<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="quantumGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer quantum ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#quantumGradient)" stroke-width="2" opacity="0.3"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#quantumGradient)" stroke-width="1" opacity="0.5"/>
  
  <!-- Central hexagon representing quantum core -->
  <path d="M50 15 L70 27.5 L70 52.5 L50 65 L30 52.5 L30 27.5 Z" 
        fill="none" 
        stroke="url(#quantumGradient)" 
        stroke-width="2"
        filter="url(#glow)"/>
  
  <!-- Quantum nodes -->
  <circle cx="50" cy="15" r="4" fill="url(#quantumGradient)"/>
  <circle cx="70" cy="27.5" r="4" fill="url(#quantumGradient)"/>
  <circle cx="70" cy="52.5" r="4" fill="url(#quantumGradient)"/>
  <circle cx="50" cy="65" r="4" fill="url(#quantumGradient)"/>
  <circle cx="30" cy="52.5" r="4" fill="url(#quantumGradient)"/>
  <circle cx="30" cy="27.5" r="4" fill="url(#quantumGradient)"/>
  
  <!-- Neural network connections -->
  <line x1="50" y1="15" x2="70" y2="27.5" stroke="url(#quantumGradient)" stroke-width="1" opacity="0.5"/>
  <line x1="70" y1="27.5" x2="70" y2="52.5" stroke="url(#quantumGradient)" stroke-width="1" opacity="0.5"/>
  <line x1="70" y1="52.5" x2="50" y2="65" stroke="url(#quantumGradient)" stroke-width="1" opacity="0.5"/>
  <line x1="50" y1="65" x2="30" y2="52.5" stroke="url(#quantumGradient)" stroke-width="1" opacity="0.5"/>
  <line x1="30" y1="52.5" x2="30" y2="27.5" stroke="url(#quantumGradient)" stroke-width="1" opacity="0.5"/>
  <line x1="30" y1="27.5" x2="50" y2="15" stroke="url(#quantumGradient)" stroke-width="1" opacity="0.5"/>
  
  <!-- Central AI core -->
  <circle cx="50" cy="40" r="8" fill="url(#quantumGradient)" opacity="0.8"/>
  <circle cx="50" cy="40" r="5" fill="white" opacity="0.9"/>
  
  <!-- Orbital electrons representing quantum states -->
  <circle cx="50" cy="75" r="2" fill="url(#quantumGradient)" opacity="0.7">
    <animateTransform attributeName="transform"
                      attributeType="XML"
                      type="rotate"
                      from="0 50 50"
                      to="360 50 50"
                      dur="10s"
                      repeatCount="indefinite"/>
  </circle>
  <circle cx="25" cy="50" r="2" fill="url(#quantumGradient)" opacity="0.7">
    <animateTransform attributeName="transform"
                      attributeType="XML"
                      type="rotate"
                      from="0 50 50"
                      to="-360 50 50"
                      dur="8s"
                      repeatCount="indefinite"/>
  </circle>
  <circle cx="75" cy="50" r="2" fill="url(#quantumGradient)" opacity="0.7">
    <animateTransform attributeName="transform"
                      attributeType="XML"
                      type="rotate"
                      from="0 50 50"
                      to="360 50 50"
                      dur="6s"
                      repeatCount="indefinite"/>
  </circle>
</svg>