services:

  router-server:
    build:
      context: .
      dockerfile: src/router-server/router-server.dockerfile
    image: router-server:latest
    shm_size: 8G
    ulimits:
      memlock: -1
      stack: 67108864
    volumes:
      - ./routers/:/model_repository
    command: tritonserver --log-verbose=1 --model-repository=/model_repository
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    networks:
      - llm-router-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ "0" ]
              capabilities: [ gpu ]

  app:
    build:
      context: .
      dockerfile: demo/app/app.dockerfile
    image: llm-router-client:app
    working_dir: /app
    ports:
      - 8008:8008
    networks:
      - llm-router-network

  router-controller:
    build:
      context: .
      dockerfile: src/router-controller/router-controller.dockerfile
    image: router-controller:latest
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
    ports:
      - "8084:8084"
    networks:
      - llm-router-network

  prometheus:
    image: prom/prometheus:v2.35.0
    volumes:
      - ./src/prometheus:/etc/prometheus
    ports:
      - "9090:9090"
    networks:
      - llm-router-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:9.1.6
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=secret # Change this password
    ports:
      - "3000:3000"
    networks:
      - llm-router-network
    depends_on:
      - prometheus

  locust:
    build:
      context: .
      dockerfile: demo/loadtest/locust.dockerfile
    image: locust:latest
    ports:
      - "8089:8089"
      - "4000:4000"
    command: -f /mnt/locust/locustfile.py --host http://router-controller:8084
    networks:
      - llm-router-network

  router-builder:
    build:
      dockerfile: customize/router_builder.dockerfile
    shm_size: 8G
    ulimits:
      memlock: -1
      stack: 67108864
    volumes:
      - ./customize:/workspace
      - ./routers/:/model_repository
    command: jupyter lab --no-browser --allow-root --ip=0.0.0.0 --port=9999 --NotebookApp.token "" --NotebookApp.password "" --notebook-dir "/workspace/"
    ports:
      - "9999:9999"
    networks:
      - llm-router-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ "0" ]
              capabilities: [ gpu ]

  # VibeCaaS Services
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=vibecaas_user
      - POSTGRES_PASSWORD=vibecaas_dev_password
      - POSTGRES_DB=vibecaas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - llm-router-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibecaas_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - llm-router-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  vibe-router:
    build:
      context: ./backend/services/vibe_router
      dockerfile: Dockerfile
    ports:
      - "8003:8001"  # Router service
      - "8004:8002"  # Integration service
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - DATABASE_URL=postgresql://vibecaas_user:vibecaas_dev_password@postgres:5432/vibecaas
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/services/vibe_router/config.yaml:/app/config.yaml:ro
    networks:
      - llm-router-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/health')"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

volumes:
  grafana_data:
  postgres_data:
  redis_data:


networks:
  llm-router-network:
    driver: bridge
